name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install types-requests types-PyYAML types-psutil types-redis types-aiofiles types-python-dateutil types-pytz types-cryptography

      - name: Run Ruff
        run: ruff check .

      - name: Run Black format check
        run: black --check .

      - name: Run mypy
        run: mypy app/ config/ --config-file=pyproject.toml

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Bandit
        run: bandit -r app/ config/ -x tests/ -c pyproject.toml

      - name: Run pip-audit
        run: pip-audit --strict --desc --ignore-vuln CVE-2024-23342

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short -m "not integration"
        env:
          PYTHONPATH: .
          OPENAI_API_KEY: "test-key"
          DATABASE_URL: "sqlite:///test.db"
          ADMIN_PASSWORD: "test-admin-password"
          TELEGRAM_BOT_TOKEN: "test-bot-token"
          SECRET_KEY: "test-secret-key"

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: whatsapp_digest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration and e2e tests
        run: pytest tests/ -v --tb=short -m "integration or e2e" --cov=app --cov=config --cov-report=xml
        env:
          PYTHONPATH: .
          DATABASE_URL: "postgresql://test:test@localhost:5432/whatsapp_digest_test"
          REDIS_URL: "redis://localhost:6379/0"
          OPENAI_API_KEY: "test-key"
          ADMIN_PASSWORD: "test-admin-password"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
